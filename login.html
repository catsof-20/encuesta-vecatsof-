<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vecatsof - Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation"></div>
    <div class="container" style="max-width: 450px;">
        <header style="text-align: center; margin-bottom: 30px;">
            <div class="date-badge">ACCESO CLIENTES</div>
            <h1 style="color: white; font-weight: 800;">BIENVENIDO</h1>
        </header>

        <main class="glass-card">
            <form id="login-form">
                <div class="input-group">
                    <label for="login-email" style="color: white; font-size: 0.8rem; margin-bottom: 5px; display: block;">Email</label>
                    <input type="email" id="login-email" placeholder="email@ejemplo.com" required>
                    
                    <label for="login-password" style="color: white; font-size: 0.8rem; margin-top: 15px; margin-bottom: 5px; display: block;">Contraseña</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="submit-btn active" style="width: 100%; margin-top: 30px;">
                    Entrar al Sistema
                </button>
            </form>

            <p style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
                ¿No tienes cuenta? <a href="/" style="color: #ff6b81; font-weight: bold; text-decoration: none;">Regístrate aquí</a>
            </p>
        </main>
    </div>

    <script type="module" src="/src/app.ts"></script>
</body>
</html>
