<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vecatsof - Registro de Clientes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation"></div>
    <div class="container">
        <header style="text-align: center; margin-bottom: 30px;">
            <div class="date-badge">VECATSOF DB</div>
            <h1 style="color: white; font-weight: 800; letter-spacing: -1px;">REGISTRO DE CLIENTES</h1>
            <p style="color: rgba(255,255,255,0.8);">Completa los pasos para darte de alta en nuestro sistema.</p>
        </header>

        <main class="glass-card">
            <!-- Progress Bar -->
            <div class="progress-container" style="display: flex; justify-content: space-between; margin-bottom: 30px; position: relative;">
                <div class="step active" id="step-node-1">1</div>
                <div class="step" id="step-node-2">2</div>
            </div>

            <form id="registration-form">
                <!-- Paso 1: Datos Personales -->
                <section id="step-1" class="form-step">
                    <h2>Datos Personales</h2>
                    <div class="input-group">
                        <input type="text" id="nombre" placeholder="Nombre Completo" required>
                        <input type="email" id="email" placeholder="Correo Electrónico" required>
                        <input type="password" id="password" placeholder="Contraseña" required>
                        <input type="tel" id="telefono" placeholder="Teléfono de contacto">
                    </div>
                </section>

                <!-- Paso 2: Dirección -->
                <section id="step-2" class="form-step hidden">
                    <h2>Dirección de Envío</h2>
                    <div class="input-group">
                        <input type="text" id="calle" placeholder="Calle y número">
                        <input type="text" id="ciudad" placeholder="Ciudad">
                        <input type="text" id="zip" placeholder="Código Postal">
                        <input type="text" id="provincia" placeholder="Provincia">
                    </div>
                </section>


                <div class="nav-buttons" style="display: flex; gap: 15px; margin-top: 30px;">
                    <button type="button" id="prev-btn" class="submit-btn hidden" style="background: rgba(255,255,255,0.1);">Anterior</button>
                    <button type="button" id="next-btn" class="submit-btn active" style="flex: 1;">Siguiente</button>
                    <button type="submit" id="submit-reg-btn" class="submit-btn active hidden" style="flex: 1;">Finalizar Registro</button>
                </div>
            </form>

            <p style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
                ¿Ya tienes cuenta? <a href="login.html" style="color: #ff6b81; font-weight: bold; text-decoration: none;">Inicia sesión aquí</a>
            </p>
        </main>
    </div>

    <script type="module" src="./src/app.ts"></script>
</body>
</html>
